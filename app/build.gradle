plugins {
    id 'com.android.application'
}

android {
    namespace 'com.smartdashboard'
    namespace 'com.smartdashboard'
    compileSdkVersion 33
    defaultConfig {
        applicationId "com.smartdashboard"
        minSdkVersion 14
        targetSdkVersion 22
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
}
